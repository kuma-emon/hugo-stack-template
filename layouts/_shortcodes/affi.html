{{- $id := .Get "id" | string -}}
{{- $mapping := index .Site.Data "affi-mapping" -}}
{{- $entry := index $mapping $id -}}
{{- if $entry -}}
{{- $url := $entry.url -}}
{{- with .Site.Params.amazonTag -}}{{- $url = printf "%s?tag=%s" $url . -}}{{- end -}}
<a href="{{ $url }}" target="_blank" rel="noopener" class="affi-link">{{ $entry.text }}</a>
{{- else -}}
<!-- affi id={{ $id }} not found -->
{{- end -}}
