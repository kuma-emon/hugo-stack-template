# Cloudflare Pages デプロイワークフロー
#
# セットアップ手順：
# 1. Cloudflare ダッシュボード → Workers & Pages → Pages で新規プロジェクトを作成
# 2. このファイル末尾の `--project-name=your-project-name` を作成したプロジェクト名に書き換える
# 3. GitHub リポジトリの Settings → Secrets and variables → Actions に以下を登録：
#    - CLOUDFLARE_API_TOKEN（Cloudflare ダッシュボード → My Profile → API Tokens で発行・Pages 編集権限）
#    - CLOUDFLARE_ACCOUNT_ID（ダッシュボード右サイドバーで確認できる Account ID）
#
# GitHub Actions を使わず Cloudflare Pages のダッシュボード Git 連携で配信したい場合は
# このファイルを削除してください（README の代替セットアップ参照）。

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.0'
          extended: true

      - name: Set short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build
        run: hugo --minify
        env:
          HUGO_PARAMS_GITHASH: ${{ env.SHORT_SHA }}
          TZ: Asia/Tokyo

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=your-project-name --branch=${{ github.ref_name }} --commit-message=${{ env.SHORT_SHA }} --commit-dirty=true
